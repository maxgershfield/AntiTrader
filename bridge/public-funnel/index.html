<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AntiTrader — Lead capture</title>
  <style>
    :root { --fg: #e8f0e4; --muted: #8a9a8a; --accent: #7ab87a; --bg: #0a120e; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; padding: 32px 20px 48px; line-height: 1.5; }
    h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 8px; }
    p.lead { color: var(--muted); font-size: 0.9rem; margin: 0 0 24px; max-width: 36rem; }
    form { max-width: 22rem; display: grid; gap: 14px; }
    label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
    input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a3a32; background: #0f1a14; color: var(--fg); font-size: 1rem; }
    input:focus { outline: 2px solid var(--accent); border-color: transparent; }
    button { margin-top: 8px; padding: 12px 18px; border: none; border-radius: 10px; background: var(--accent); color: #030a06; font-weight: 600; font-size: 0.95rem; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { font-size: 0.9rem; margin-top: 16px; }
    .msg.ok { color: var(--accent); }
    .msg.err { color: #e88; }
    .utm-hint { font-size: 0.75rem; color: var(--muted); margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Get in touch</h1>
  <p class="lead">Demo funnel page. UTM parameters in the URL are stored with the lead in Twenty (<code>jobTitle</code> line).</p>
  <form id="f">
    <div>
      <label for="firstName">First name</label>
      <input id="firstName" name="firstName" autocomplete="given-name" required />
    </div>
    <div>
      <label for="lastName">Last name</label>
      <input id="lastName" name="lastName" autocomplete="family-name" required />
    </div>
    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required />
    </div>
    <div>
      <label for="phone">Phone (optional)</label>
      <input id="phone" name="phone" type="tel" autocomplete="tel" />
    </div>
    <input type="hidden" name="utm_source" id="utm_source" />
    <input type="hidden" name="utm_medium" id="utm_medium" />
    <input type="hidden" name="utm_campaign" id="utm_campaign" />
    <input type="hidden" name="utm_content" id="utm_content" />
    <button type="submit" id="btn">Submit</button>
  </form>
  <p id="out" class="msg" aria-live="polite"></p>
  <p class="utm-hint">Add <code>?utm_source=test&amp;utm_medium=cpc&amp;utm_campaign=spring</code> to this page URL to test attribution.</p>
  <script>
    (function () {
      var q = new URLSearchParams(window.location.search)
      ;['utm_source','utm_medium','utm_campaign','utm_content'].forEach(function (k) {
        var el = document.getElementById(k)
        if (el) el.value = q.get(k) || ''
      })
    })()
    document.getElementById('f').addEventListener('submit', async function (e) {
      e.preventDefault()
      var out = document.getElementById('out')
      var btn = document.getElementById('btn')
      out.textContent = ''
      out.className = 'msg'
      btn.disabled = true
      var fd = new FormData(e.target)
      var body = {}
      fd.forEach(function (v, k) { body[k] = String(v).trim() })
      try {
        var r = await fetch('/funnel/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        })
        var t = await r.text()
        if (!r.ok) throw new Error(t || r.statusText)
        out.className = 'msg ok'
        out.textContent = 'Thanks — your details were sent. Check Twenty and n8n Executions.'
        e.target.reset()
        ;(function () {
          var q = new URLSearchParams(window.location.search)
          ;['utm_source','utm_medium','utm_campaign','utm_content'].forEach(function (k) {
            var el = document.getElementById(k)
            if (el) el.value = q.get(k) || ''
          })
        })()
      } catch (err) {
        out.className = 'msg err'
        out.textContent = 'Could not submit: ' + (err && err.message ? err.message : 'error')
      } finally {
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
